openapi: 3.1.0
info:
  title: Rubitime API
  version: "1.0.0"
  summary: Публичное OpenAPI-описание методов Rubitime API и webhook-событий.
  description: |
    API Rubitime позволяет получать, создавать, обновлять и удалять записи, получать расписание дат и времени для записи,
    а также принимать webhook-уведомления о создании, обновлении и удалении записей. Подробнее [на официальном сайтe](https://rubitime.ru/faq/api).


    # Как получить API-ключ

    1. Авторизуйтесь в Rubitime ( https://rubitime.ru/profile/ )
    2. Откройте настройки .
    3. Перейдите на 5 шаг настроек.
    4. Найдите блок "Получение и сохранение данных при помощи API".
    5. Нажмите "Сгенерировать ключ".

    API-ключ передается в JSON-теле каждого запроса в поле `rk`.

    API-ключ передается в JSON-теле каждого запроса в поле `rk`.

    ## Как включить webhook

    В том же блоке настроек укажите публичный HTTPS-адрес вашего обработчика в поле "Вебхук URL".
    Rubitime будет отправлять на этот адрес события:

    - `event-create-record` - создана новая запись;
    - `event-update-record` - обновлена запись;
    - `event-remove-record` - удалена запись.

    Чтобы webhook считался доставленным, ваш сервер должен вернуть HTTP-код `200`.

    ## Общий формат ответа API

    Методы Rubitime возвращают JSON-объект с полями `status`, `message` и `data`.
    Бизнес-ошибка обычно передается как `status: error` внутри JSON-ответа.

    ## Ограничение частоты

    Отправляйте запросы к Rubitime API не чаще одного раза в 5 секунд.
servers:
  - url: https://rubitime.ru
    description: Production Rubitime API
tags:
  - name: Records
    description: Получение, создание, обновление и удаление записей.
  - name: Schedule
    description: Получение дат и времени для записи.
  - name: Webhooks
    description: События, которые Rubitime отправляет на URL клиента.
paths:
  /api2/get-record:
    post:
      tags:
        - Records
      operationId: getRecord
      summary: Получить запись
      description: Возвращает данные записи Rubitime по ее `id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRecordRequest"
            examples:
              getRecord:
                summary: Получение записи по id
                value:
                  rk: xxx
                  id: 50
      responses:
        "200":
          description: Успешный ответ или бизнес-ошибка в поле `status`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"
              examples:
                ok:
                  summary: Запись найдена
                  value:
                    status: ok
                    message: Success
                    data:
                      id: 8522929
                      parent_record: null
                      whom: 0
                      created_at: "2026-06-19 13:47:20"
                      updated_at: "2026-06-19 13:48:09"
                      record: "2026-06-28 15:00:00"
                      name: Тестовый Клиент
                      price: "100"
                      phone: "+79999999999"
                      email: client@example.com
                      comment: Test
                      status: 0
                      status_title: Записан
                      cooperator_id: 39824
                      cooperator_title: Сотрудник Rubitime
                      branch_id: 19697
                      branch_title: "г. Москва, тестовый филиал"
                      service_id: 71790
                      service_title: Персональная тренировка
                      duration: "60"
                      prepayment: "100"
                      prepayment_date: "2026-06-19 13:48:09"
                      prepayment_url: https://rubitime.ru/widget/prp/xxx
                      reminder: "2026-06-27 15:00:00"
                      custom_field1: "030303"
                      custom_field2: М
                      url: https://rubitime.ru/widget/card/xxx
                error:
                  summary: Запись не найдена или ключ неверный
                  value:
                    status: error
                    message: Record not found
                    data: []
  /api2/create-record:
    post:
      tags:
        - Records
      operationId: createRecord
      summary: Создать запись
      description: |
        Создает новую запись. Обязательные поля: `rk`, `branch_id`, `cooperator_id`, `service_id`, `status`, `record`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordRequest"
            examples:
              createRecord:
                summary: Создание записи клиента
                value:
                  rk: xxx
                  branch_id: 1
                  cooperator_id: 2
                  service_id: 4
                  status: 0
                  record: "2021-12-08 13:30:03"
                  name: Test name
                  price: 50.25
                  phone: "+77999999998"
                  email: test@test.ru
                  comment: Test comment
                  reminder: "2021-12-12 00:00:00"
                  reminder_minutes: 60
      responses:
        "200":
          description: Результат создания записи.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecordResponse"
              examples:
                ok:
                  summary: Запись создана
                  value:
                    status: ok
                    message: Success
                    data:
                      id: 123
                      url: https://rubitime.ru/card/xxx
                error:
                  summary: Ошибка валидации или доступа
                  value:
                    status: error
                    message: Invalid API key
                    data: []
  /api2/update-record:
    post:
      tags:
        - Records
      operationId: updateRecord
      summary: Обновить запись
      description: |
        Обновляет существующую запись. Обязательные поля: `rk` и `id`.
        В запрос можно передавать только изменяемые поля.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecordRequest"
            examples:
              markPaid:
                summary: Отметить запись оплаченной и перевести в статус "Записан"
                value:
                  rk: xxx
                  id: 50
                  prepayment: 100
                  prepayment_date: "2021-12-01 10:00:00"
                  status: 0
      responses:
        "200":
          description: Результат обновления записи.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"
              examples:
                ok:
                  summary: Запись обновлена
                  value:
                    status: ok
                    message: Success
                    data:
                      id: 50
                      status: 0
                      status_title: Записан
                      prepayment: "100"
                      prepayment_date: "2021-12-01 10:00:00"
                error:
                  summary: Ошибка обновления
                  value:
                    status: error
                    message: Record not found
                    data: []
  /api2/remove-record:
    post:
      tags:
        - Records
      operationId: removeRecord
      summary: Удалить запись
      description: Удаляет запись Rubitime по `id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveRecordRequest"
            examples:
              removeRecord:
                summary: Удаление записи
                value:
                  rk: xxx
                  id: 79379
      responses:
        "200":
          description: Результат удаления записи.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseRubitimeResponse"
              examples:
                ok:
                  summary: Запись удалена
                  value:
                    status: ok
                    message: Success
                    data: []
                error:
                  summary: Ошибка удаления
                  value:
                    status: error
                    message: Record not found
                    data: []
  /api2/get-schedule:
    post:
      tags:
        - Schedule
      operationId: getSchedule
      summary: Получить даты и время для записи
      description: |
        Возвращает расписание по филиалу, сотруднику и услуге.

        Параметр `only_available`:

        - `1` - только даты и время, доступные для записи;
        - `0` - только занятые даты и время;
        - не передан - все даты и время.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetScheduleRequest"
            examples:
              availableOnly:
                summary: Только свободные слоты
                value:
                  rk: xxx
                  branch_id: 1
                  cooperator_id: 3
                  service_id: 2
                  only_available: 1
              allSlots:
                summary: Все слоты
                value:
                  rk: xxx
                  branch_id: 1
                  cooperator_id: 3
                  service_id: 2
      responses:
        "200":
          description: Расписание или бизнес-ошибка в поле `status`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
              examples:
                ok:
                  summary: Расписание
                  value:
                    status: ok
                    message: Success
                    data:
                      "2024-04-19":
                        "11:00":
                          available: false
                        "12:00":
                          available: true
                        "13:00":
                          available: false
                      "2024-04-20":
                        "11:00":
                          available: true
                        "12:00":
                          available: false
                        "13:00":
                          available: false
                error:
                  summary: Ошибка доступа или параметров
                  value:
                    status: error
                    message: Invalid API key
                    data: []
webhooks:
  rubitimeRecordEvent:
    post:
      tags:
        - Webhooks
      operationId: rubitimeRecordEvent
      summary: Webhook о создании, обновлении или удалении записи
      description: |
        Rubitime отправляет этот запрос на URL, указанный в настройках в поле "Вебхук URL".
        Сервер получателя должен вернуть HTTP `200`, чтобы событие считалось доставленным.

        Текущий проект `rubitime-gcal-integration` принимает такие события на `POST /webhook`,
        требует поля `event`, `data` и `data.id`, а числовые поля вроде `price`, `status`, `duration`,
        `prepayment` принимает как числа или строки.
      servers:
        - url: https://{your-domain}
          description: Публичный URL вашего обработчика webhook
          variables:
            your-domain:
              default: example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
            examples:
              created:
                summary: Создание записи, ожидание предоплаты
                value:
                  from: user
                  event: event-create-record
                  data:
                    id: 8522929
                    parent_record: null
                    whom: 0
                    created_at: "2026-06-19 13:47:20"
                    updated_at: null
                    record: "2026-06-28 15:00:00"
                    name: Тестовый Клиент
                    price: "100"
                    phone: "+79999999999"
                    email: client@example.com
                    comment: Test
                    status: 3
                    status_title: Ожидание предоплаты
                    cooperator_id: 39824
                    cooperator_title: Сотрудник Rubitime
                    branch_id: 19697
                    branch_title: "г. Москва, тестовый филиал"
                    service_id: 71790
                    service_title: Персональная тренировка
                    url: https://rubitime.ru/widget/card/xxx
                    source: https://example.com/
                    duration: "60"
                    prepayment: "100"
                    prepayment_date: null
                    prepayment_url: null
                    reminder: "2026-06-27 15:00:00"
                    custom_field1: "030303"
                    custom_field2: М
              updated:
                summary: Обновление записи после оплаты
                value:
                  from: user
                  event: event-update-record
                  data:
                    id: 8522929
                    updated_at: "2026-06-19 13:48:09"
                    record: "2026-06-28 15:00:00"
                    name: Тестовый Клиент
                    price: "100"
                    status: 0
                    status_title: Записан
                    prepayment: "100"
                    prepayment_date: "2026-06-19 13:48:09"
                    prepayment_url: https://rubitime.ru/widget/prp/xxx
                    duration: "60"
                    url: https://rubitime.ru/widget/card/xxx
              removed:
                summary: Удаление записи
                value:
                  from: user
                  event: event-remove-record
                  data:
                    id: 8522929
      responses:
        "200":
          description: Webhook принят получателем.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAcceptedResponse"
              examples:
                accepted:
                  summary: Ответ текущего проекта
                  value:
                    ok: true
                    accepted: true
                    record_id: 8522929
                    event: event-create-record
        "400":
          description: Некорректное тело запроса или ошибка валидации на стороне получателя.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookErrorResponse"
              examples:
                validationFailed:
                  value:
                    ok: false
                    error: validation_failed
components:
  schemas:
    BaseRubitimeResponse:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          $ref: "#/components/schemas/RubitimeStatus"
        message:
          type: string
          description: Текст результата выполнения запроса.
          examples:
            - Success
        data:
          description: Результат выполнения запроса. Форма зависит от метода.
    CreateRecordResponse:
      allOf:
        - $ref: "#/components/schemas/BaseRubitimeResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: integer
                  description: ID созданной записи.
                  examples:
                    - 123
                url:
                  type: string
                  format: uri
                  description: URL созданной записи.
                  examples:
                    - https://rubitime.ru/card/xxx
    RecordResponse:
      allOf:
        - $ref: "#/components/schemas/BaseRubitimeResponse"
        - type: object
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/Record"
                - type: array
                  description: Пустой массив может возвращаться при ошибке или отсутствии данных.
                  maxItems: 0
    ScheduleResponse:
      allOf:
        - $ref: "#/components/schemas/BaseRubitimeResponse"
        - type: object
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/ScheduleData"
                - type: array
                  description: Пустой массив может возвращаться при ошибке.
                  maxItems: 0
    RubitimeStatus:
      type: string
      enum:
        - ok
        - error
    ApiKey:
      type: string
      description: API-ключ Rubitime из блока "Получение и сохранение данных при помощи API".
      minLength: 1
      examples:
        - xxx
    IdLike:
      oneOf:
        - type: integer
        - type: string
      description: Идентификатор. Rubitime в примерах допускает числовые значения как числа или строки.
    MoneyLike:
      oneOf:
        - type: number
        - type: string
      description: Денежное значение. В webhook может приходить строкой.
    DateTimeString:
      type: string
      description: Дата и время в формате `YYYY-MM-DD HH:mm:ss`.
      pattern: "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"
      examples:
        - "2026-06-28 15:00:00"
    GetRecordRequest:
      type: object
      required:
        - rk
        - id
      properties:
        rk:
          $ref: "#/components/schemas/ApiKey"
        id:
          $ref: "#/components/schemas/IdLike"
      additionalProperties: false
    RemoveRecordRequest:
      type: object
      required:
        - rk
        - id
      properties:
        rk:
          $ref: "#/components/schemas/ApiKey"
        id:
          $ref: "#/components/schemas/IdLike"
      additionalProperties: false
    CreateRecordRequest:
      allOf:
        - $ref: "#/components/schemas/RecordWriteFields"
        - type: object
          required:
            - rk
            - branch_id
            - cooperator_id
            - service_id
            - status
            - record
    UpdateRecordRequest:
      allOf:
        - $ref: "#/components/schemas/RecordWriteFields"
        - type: object
          required:
            - rk
            - id
    RecordWriteFields:
      type: object
      properties:
        rk:
          $ref: "#/components/schemas/ApiKey"
        id:
          $ref: "#/components/schemas/IdLike"
          description: ID записи. Требуется только для `update-record`.
        branch_id:
          $ref: "#/components/schemas/IdLike"
          description: ID филиала.
        cooperator_id:
          $ref: "#/components/schemas/IdLike"
          description: ID сотрудника.
        service_id:
          $ref: "#/components/schemas/IdLike"
          description: ID услуги.
        status:
          oneOf:
            - type: integer
            - type: string
          description: Статус записи. Например, `0` - "Записан", `3` - "Ожидание предоплаты".
        record:
          $ref: "#/components/schemas/DateTimeString"
        name:
          type: string
          description: Имя клиента.
        price:
          $ref: "#/components/schemas/MoneyLike"
        phone:
          type: string
          description: Телефон клиента.
          examples:
            - "+77999999998"
        email:
          type: string
          format: email
          description: Email клиента.
        comment:
          type: string
          description: Комментарий к записи.
        reminder:
          $ref: "#/components/schemas/DateTimeString"
        reminder_minutes:
          type: integer
          description: За сколько минут до записи отправить напоминание.
        prepayment:
          $ref: "#/components/schemas/MoneyLike"
        prepayment_date:
          $ref: "#/components/schemas/DateTimeString"
        custom_field1:
          type: string
          description: Пользовательское поле 1. В текущем проекте используется как дата рождения.
        custom_field2:
          type: string
          description: Пользовательское поле 2. В текущем проекте используется как пол.
      additionalProperties: true
    GetScheduleRequest:
      type: object
      required:
        - rk
        - branch_id
        - cooperator_id
        - service_id
      properties:
        rk:
          $ref: "#/components/schemas/ApiKey"
        branch_id:
          $ref: "#/components/schemas/IdLike"
          description: ID филиала.
        cooperator_id:
          $ref: "#/components/schemas/IdLike"
          description: ID сотрудника.
        service_id:
          $ref: "#/components/schemas/IdLike"
          description: ID услуги.
        only_available:
          oneOf:
            - type: integer
              enum:
                - 0
                - 1
            - type: string
              enum:
                - "0"
                - "1"
          description: Фильтр доступности слотов.
      additionalProperties: false
    ScheduleData:
      type: object
      description: |
        Объект, где ключ верхнего уровня - дата `YYYY-MM-DD`, ключ вложенного уровня - время `HH:mm`.
      additionalProperties:
        type: object
        additionalProperties:
          $ref: "#/components/schemas/ScheduleSlot"
      examples:
        - "2024-04-19":
            "12:00":
              available: true
    ScheduleSlot:
      type: object
      required:
        - available
      properties:
        available:
          type: boolean
          description: Доступен ли слот для записи.
      additionalProperties: true
    WebhookPayload:
      type: object
      required:
        - event
        - data
      properties:
        from:
          type:
            - string
            - "null"
          description: Источник события.
          examples:
            - user
        event:
          $ref: "#/components/schemas/WebhookEvent"
        data:
          $ref: "#/components/schemas/Record"
      additionalProperties: true
    WebhookEvent:
      type: string
      enum:
        - event-create-record
        - event-update-record
        - event-remove-record
    WebhookAcceptedResponse:
      type: object
      required:
        - ok
        - accepted
        - record_id
        - event
      properties:
        ok:
          type: boolean
          const: true
        accepted:
          type: boolean
          const: true
        record_id:
          type: integer
        event:
          $ref: "#/components/schemas/WebhookEvent"
    WebhookErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          examples:
            - empty_or_invalid_body
            - validation_failed
            - client_disconnected
    Record:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          description: ID записи Rubitime.
        parent_record:
          type:
            - integer
            - "null"
          description: ID родительской записи, если есть.
        whom:
          type:
            - integer
            - "null"
        created_at:
          oneOf:
            - $ref: "#/components/schemas/DateTimeString"
            - type: "null"
        updated_at:
          oneOf:
            - $ref: "#/components/schemas/DateTimeString"
            - type: "null"
        record:
          oneOf:
            - $ref: "#/components/schemas/DateTimeString"
            - type: "null"
          description: Дата и время записи.
        name:
          type: string
          description: Имя клиента.
        price:
          $ref: "#/components/schemas/MoneyLike"
        phone:
          type: string
        email:
          type: string
          format: email
        comment:
          type: string
        status:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
          description: Статус записи. Например, `0` - "Записан", `3` - "Ожидание предоплаты".
        status_title:
          type: string
          description: Человекочитаемое название статуса.
        cooperator_id:
          type:
            - integer
            - string
            - "null"
          description: ID сотрудника.
        cooperator_title:
          type: string
          description: Имя сотрудника.
        branch_id:
          type:
            - integer
            - string
            - "null"
          description: ID филиала.
        branch_title:
          type: string
          description: Название или адрес филиала.
        service_id:
          type:
            - integer
            - string
            - "null"
          description: ID услуги.
        service_title:
          type: string
          description: Название услуги.
        duration:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
          description: Продолжительность записи в минутах.
        prepayment:
          oneOf:
            - type: integer
            - type: number
            - type: string
            - type: "null"
          description: Сумма предоплаты.
        prepayment_date:
          oneOf:
            - $ref: "#/components/schemas/DateTimeString"
            - type: "null"
          description: Дата предоплаты.
        prepayment_url:
          type:
            - string
            - "null"
          format: uri
          description: URL страницы оплаты.
        reminder:
          oneOf:
            - $ref: "#/components/schemas/DateTimeString"
            - type: "null"
        url:
          type: string
          format: uri
          description: URL карточки записи Rubitime.
